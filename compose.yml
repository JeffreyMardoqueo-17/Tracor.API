services:
  db:
    image: postgres:16-alpine
    container_name: tradecorp-db
    restart: unless-stopped
    command: ["postgres", "-c", "timezone=UTC"]
    environment:
      POSTGRES_DB: Tradecorp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: UTC
      PGTZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Tracor.Infrastructure/database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d Tradecorp"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  api:
    build:
      context: .
      dockerfile: Tracor.API/Dockerfile
    container_name: tradecorp-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=Tradecorp;Username=postgres;Password=postgres
    ports:
      - "8080:8080"
    expose:
      - "8080"

volumes:
  postgres_data:
